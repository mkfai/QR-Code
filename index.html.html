<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Share Your Memories</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f6f2;
      padding: 24px;
      text-align: center;
    }

    .card {
      max-width: 420px;
      margin: auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
    }

    h2 {
      margin-top: 0;
    }

    input[type="file"],
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      background: #111;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      margin-top: 12px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>❤️ Share Your Memories</h2>
    <p>Upload your photos & videos from today</p>

    <form
      method="POST"
      action="https://docs.google.com/forms/d/e/1FAIpQLSdI-zxAqjR2TS1iBXWqbnesCY735X0dWw5kATw-Wntl-cDF7g/formResponse"
      enctype="multipart/form-data"
      target="_self"
      id="uploadForm"
    >
      <!-- File upload -->
      <input
        type="file"
        name="entry.728087775"
        accept="image/*,video/*"
        multiple
        required
      />

      <!-- Message -->
      <input
        type="text"
        name="entry.185980027"
        placeholder="Message for the couple (optional)"
      />

      <!-- Hidden Upload ID -->
      <input
        type="hidden"
        name="entry.989863965"
        id="uploadId"
      />

      <button type="submit">Upload</button>
    </form>

    <p id="doneMsg" style="display:none;">✅ Thank you for uploading!</p>
  </div>

  <script>
    // Generate unique upload ID
    const uploadId =
      Date.now().toString() + "-" + Math.random().toString(36).slice(2);

    document.getElementById("uploadId").value = uploadId;

    // Prevent accidental double upload
    if (localStorage.getItem("alreadyUploaded")) {
      document.getElementById("uploadForm").style.display = "none";
      document.getElementById("doneMsg").style.display = "block";
    }

    document.getElementById("uploadForm").addEventListener("submit", () => {
      localStorage.setItem("alreadyUploaded", "yes");
    });
  </script>
</body>
</html>
