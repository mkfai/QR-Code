<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorothy & Kenneth — Share Your Memories</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fdf6f0; text-align: center; color: #5d4037; padding: 10px; }
        .container { max-width: 400px; margin: 30px auto; padding: 25px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { color: #d63384; font-size: 1.5rem; margin-bottom: 5px; }
        p { font-size: 0.9rem; color: #888; }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], textarea { 
            width: 100%; padding: 10px; border: 1px solid #ffb6c1; border-radius: 8px; 
            box-sizing: border-box; font-size: 1rem; outline: none;
        }
        textarea { height: 80px; resize: none; }

        .upload-area { border: 2px dashed #ffb6c1; padding: 20px; border-radius: 10px; margin: 20px 0; background: #fffafb; }
        #btn-select { background: #d63384; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 1rem; cursor: pointer; width: 100%; }
        #btn-select:disabled { background: #ccc; }
        
        #status-list { text-align: left; font-size: 0.85rem; margin-top: 15px; max-height: 150px; overflow-y: auto; }
        .loading { color: #888; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Share your joy 💖</h1>
    <p>Upload up to 10 files and leave us a note!</p>
    
    <div class="input-group">
        <label for="guestName">Your Name</label>
        <input type="text" id="guestName" placeholder="Who are you?">
    </div>

    <div class="input-group">
        <label for="guestMessage">Wishes / Message (Max 100 characters)</label>
        <textarea id="guestMessage" maxlength="100" placeholder="Leave a message for us..."></textarea>
        <div id="char-count" style="text-align: right; font-size: 0.75rem; color: #888;">0 / 100</div>
    </div>

    <div class="upload-area">
        <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display: none;">
        <button id="btn-select">Select and Upload</button>
    </div>

    <div id="status-list"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDiERWHUXRt-qSPKhyeHZnpvveGYcN0sqi-gEAE-00LDeoabhWileGscj6zglBtRZ1/exec";
    const fileInput = document.getElementById('fileInput');
    const btnSelect = document.getElementById('btn-select');
    const statusList = document.getElementById('status-list');
    const guestName = document.getElementById('guestName');
    const guestMessage = document.getElementById('guestMessage');

    btnSelect.onclick = () => {
        if (!guestName.value.trim()) {
            alert("Please tell us your name first!");
            return;
        }
        fileInput.click();
    };

    fileInput.onchange = async () => {
        const files = Array.from(fileInput.files);
        if (files.length > 10) {
            alert("Sorry, limited to 10 files!");
            return;
        }

        btnSelect.disabled = true;
        btnSelect.innerText = "Uploading...";

        for (const file of files) {
            const div = document.createElement('div');
            div.className = 'loading';
            div.innerText = `⏳ Uploading: ${file.name}...`;
            statusList.prepend(div); // 最新上傳的排在最前面

            try {
                const base64 = await toBase64(file);
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        base64: base64.split(',')[1],
                        type: file.type,
                        name: file.name,
                        uploader: guestName.value,
                        message: guestMessage.value
                    })
                });
                const result = await response.json();
                if (result.result === "success") {
                    div.innerText = `✅ Success: ${file.name}`;
                    div.style.color = "green";
                }
            } catch (err) {
                div.innerText = `❌ Failed: ${file.name}`;
                div.style.color = "red";
            }
        }

        btnSelect.disabled = false;
        btnSelect.innerText = "Continue upload";
        fileInput.value = ""; // 重設上傳欄位
    };

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
</script>

</body>
</html>
