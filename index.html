<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorothy & Kenneth — Share Your Memories</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fdf6f0; text-align: center; color: #5d4037; padding: 10px; }
        .container { max-width: 400px; margin: 20px auto; padding: 25px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { color: #d63384; font-size: 1.5rem; }
        .hint-text { font-size: 0.8rem; color: #a58e8e; margin-bottom: 15px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], textarea { 
            width: 100%; padding: 12px; border: 1px solid #ffb6c1; border-radius: 8px; 
            box-sizing: border-box; font-size: 1rem; outline: none;
        }
        textarea { height: 120px; resize: none; }
        .char-hint { text-align: right; font-size: 0.75rem; color: #999; margin-top: 4px; }
        .upload-area { border: 2px dashed #ffb6c1; padding: 20px; border-radius: 10px; margin: 20px 0; background: #fffafb; }
        #btn-select { background: #d63384; color: white; border: none; padding: 14px 30px; border-radius: 25px; font-size: 1rem; cursor: pointer; width: 100%; }
        #btn-select:disabled { background: #ccc; }
        #status-list { text-align: left; font-size: 0.85rem; margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .log-item { margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Share your joy 💖</h1>
    <div class="hint-text">
        Share us your favourite photos / videos • Up to 10 files. Max 25MB per file<br>
        
    </div>
    
    <div class="input-group">
        <label>Your Name *</label>
        <input type="text" id="guestName" placeholder="Who is sharing?">
    </div>

    <div class="input-group">
        <label>Wishes / Message (Max 500)</label>
        <textarea id="guestMessage" maxlength="500" placeholder="Write your heart out to Dorothy & Kenneth..."></textarea>
        <div id="char-count" class="char-hint">0 / 500</div>
    </div>

    <div class="upload-area">
        <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display: none;">
        <button id="btn-select">Select and Upload</button>
    </div>

    <div id="status-list"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDiERWHUXRt-qSPKhyeHZnpvveGYcN0sqi-gEAE-00LDeoabhWileGscj6zglBtRZ1/exec"; 
    
    const fileInput = document.getElementById('fileInput');
    const btnSelect = document.getElementById('btn-select');
    const statusList = document.getElementById('status-list');
    const guestName = document.getElementById('guestName');
    const guestMessage = document.getElementById('guestMessage');
    const charCount = document.getElementById('char-count');

    guestMessage.addEventListener('input', () => {
        charCount.innerText = `${guestMessage.value.length} / 500`;
    });

    btnSelect.onclick = () => {
        if (!guestName.value.trim()) {
            alert("Please tell us your name first!");
            return;
        }
        fileInput.click();
    };

    fileInput.onchange = async () => {
        const files = Array.from(fileInput.files);
        if (files.length === 0) return;
        
        // 1. 檢查數量
        if (files.length > 10) {
            alert("Max 10 files at once!");
            return;
        }

        // 2. 檢查大小 (25MB = 25 * 1024 * 1024 bytes)
        const MAX_SIZE = 25 * 1024 * 1024;
        for (let f of files) {
            if (f.size > MAX_SIZE) {
                alert(`File "${f.name}" is too large! Please keep it under 25MB.`);
                return;
            }
        }

        btnSelect.disabled = true;
        btnSelect.innerText = "Uploading...";

        for (const file of files) {
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerText = `⏳ Processing: ${file.name}`;
            statusList.prepend(div);

            try {
                const base64Data = await toBase64(file);
                div.innerText = `🚀 Uploading: ${file.name}...`;

                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    body: JSON.stringify({
                        base64: base64Data.split(',')[1],
                        type: file.type,
                        name: file.name,
                        uploader: guestName.value.trim(),
                        message: guestMessage.value.trim()
                    })
                });

                div.innerText = `✅ Success: ${file.name}`;
                div.style.color = "green";

            } catch (err) {
                div.innerText = `❌ Error: ${file.name}`;
                div.style.color = "red";
            }
        }

        btnSelect.disabled = false;
        btnSelect.innerText = "Select and Upload";
        fileInput.value = "";
    };

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
</script>

</body>
</html>
