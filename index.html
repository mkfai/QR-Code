<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚禮回憶上傳</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff5f5; text-align: center; color: #444; }
        .container { max-width: 400px; margin: 50px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { color: #d63384; font-size: 1.5rem; }
        .upload-area { border: 2px dashed #ffb6c1; padding: 20px; border-radius: 10px; margin: 20px 0; }
        #btn-select { background: #d63384; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 1rem; cursor: pointer; }
        #status-list { text-align: left; font-size: 0.9rem; margin-top: 15px; }
        .loading { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>分享我們的幸福 💖</h1>
    <p>歡迎上傳 10 張最喜歡的照片/影片</p>
    
    <div class="upload-area">
        <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display: none;">
        <button id="btn-select">選擇並上傳</button>
    </div>

    <div id="status-list"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDiERWHUXRt-qSPKhyeHZnpvveGYcN0sqi-gEAE-00LDeoabhWileGscj6zglBtRZ1/exec"; // 貼上剛才部署得到的網址
    const fileInput = document.getElementById('fileInput');
    const btnSelect = document.getElementById('btn-select');
    const statusList = document.getElementById('status-list');

    btnSelect.onclick = () => fileInput.click();

    fileInput.onchange = async () => {
        const files = Array.from(fileInput.files);
        if (files.length > 10) {
            alert("抱歉，一次最多只能上傳 10 張喔！");
            return;
        }

        btnSelect.disabled = true;
        btnSelect.innerText = "上傳中...";

        for (const file of files) {
            const div = document.createElement('div');
            div.className = 'loading';
            div.innerText = `⏳ 正在上傳: ${file.name}...`;
            statusList.appendChild(div);

            try {
                const base64 = await toBase64(file);
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        base64: base64.split(',')[1],
                        type: file.type,
                        name: file.name
                    })
                });
                const result = await response.json();
                if (result.result === "success") {
                    div.innerText = `✅ 上傳成功: ${file.name}`;
                    div.style.color = "green";
                }
            } catch (err) {
                div.innerText = `❌ 上傳失敗: ${file.name}`;
                div.style.color = "red";
            }
        }

        btnSelect.disabled = false;
        btnSelect.innerText = "繼續上傳";
    };

    // 將檔案轉為 Base64 格式
    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
</script>

</body>
</html>
