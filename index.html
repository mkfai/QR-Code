<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorothy & Kenneth — Share Your Memories</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fdf6f0; text-align: center; color: #5d4037; padding: 10px; }
        .container { max-width: 400px; margin: 20px auto; padding: 25px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { color: #d63384; font-size: 1.5rem; }
        .hint-text { font-size: 0.8rem; color: #a58e8e; margin-bottom: 15px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], textarea { 
            width: 100%; padding: 12px; border: 1px solid #ffb6c1; border-radius: 8px; 
            box-sizing: border-box; font-size: 1rem; outline: none;
        }
        textarea { height: 120px; resize: none; }
        .char-hint { text-align: right; font-size: 0.75rem; color: #999; margin-top: 4px; }
        .upload-area { border: 2px dashed #ffb6c1; padding: 20px; border-radius: 10px; margin: 20px 0; background: #fffafb; }
        #btn-select { background: #d63384; color: white; border: none; padding: 14px 30px; border-radius: 25px; font-size: 1rem; cursor: pointer; width: 100%; }
        #btn-select:disabled { background: #ccc; }
        #status-list { text-align: left; font-size: 0.85rem; margin-top: 15px; max-height: 250px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px; }
        .log-item { margin-bottom: 8px; padding: 8px; border-radius: 5px; background: #f9f9f9; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h1>Share your joy with Dorothy & Kenneth💖</h1>
    <div class="hint-text">
        Share us your favourite photos / videos<br>
        Up to 10 files • Max 25MB each
    </div>
    
    <div class="input-group">
        <label>Your Name *</label>
        <input type="text" id="guestName" placeholder="Who is sharing?">
    </div>

    <div class="input-group">
        <label>Wishes / Message (Max 500)</label>
        <textarea id="guestMessage" maxlength="500" placeholder="Write something sweet..."></textarea>
        <div id="char-count" class="char-hint">0 / 500</div>
    </div>

    <div class="upload-area">
        <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display: none;">
        <button id="btn-select">Select and Upload</button>
    </div>

    <div id="status-list"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDiERWHUXRt-qSPKhyeHZnpvveGYcN0sqi-gEAE-00LDeoabhWileGscj6zglBtRZ1/exec"; 
    
    const fileInput = document.getElementById('fileInput');
    const btnSelect = document.getElementById('btn-select');
    const statusList = document.getElementById('status-list');
    const guestName = document.getElementById('guestName');
    const guestMessage = document.getElementById('guestMessage');
    const charCount = document.getElementById('char-count');

    guestMessage.addEventListener('input', () => {
        charCount.innerText = `${guestMessage.value.length} / 500`;
    });

    btnSelect.onclick = () => {
        if (!guestName.value.trim()) {
            alert("Please tell us your name first!");
            return;
        }
        fileInput.click();
    };

    fileInput.onchange = async () => {
        const files = Array.from(fileInput.files);
        if (files.length === 0) return;
        if (files.length > 10) {
            alert("Max 10 files allowed.");
            return;
        }

        const MAX_SIZE = 25 * 1024 * 1024;
        for (let f of files) {
            if (f.size > MAX_SIZE) {
                alert(`"${f.name}" exceeds 25MB limit.`);
                return;
            }
        }

        btnSelect.disabled = true;
        btnSelect.innerText = "Queueing Upload...";
        statusList.innerHTML = ""; // 清空舊狀態

        // 核心改進：嚴格佇列處理
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const logId = `log-${i}`;
            const div = document.createElement('div');
            div.id = logId;
            div.className = 'log-item';
            div.innerText = `[${i+1}/${files.length}] ⏳ Pending: ${file.name}`;
            statusList.appendChild(div); // 改用 appendChild 按順序排列

            try {
                const itemDiv = document.getElementById(logId);
                itemDiv.innerText = `[${i+1}/${files.length}] 🚀 Uploading: ${file.name}...`;
                itemDiv.style.background = "#fff3cd";

                const base64Data = await toBase64(file);

                // 使用 await 確保 fetch 完結才繼續
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    body: JSON.stringify({
                        base64: base64Data.split(',')[1],
                        type: file.type,
                        name: file.name,
                        uploader: guestName.value.trim(),
                        message: guestMessage.value.trim()
                    })
                });

                itemDiv.innerText = `[${i+1}/${files.length}] ✅ Finished: ${file.name}`;
                itemDiv.style.background = "#d4edda";
                itemDiv.style.color = "#155724";

                // 在檔案之間強制冷卻 2 秒，這是 Android/PC 最需要的緩衝
                if (i < files.length - 1) {
                    await new Promise(r => setTimeout(r, 2000));
                }

            } catch (err) {
                const itemDiv = document.getElementById(logId);
                itemDiv.innerText = `[${i+1}/${files.length}] ❌ Failed: ${file.name}`;
                itemDiv.style.background = "#f8d7da";
                itemDiv.style.color = "#721c24";
            }
        }

        btnSelect.disabled = false;
        btnSelect.innerText = "Select and Upload";
        fileInput.value = ""; 
    };

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
</script>

</body>
</html>
